<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nômade Lavanderia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#F7F7F5;min-height:100vh;min-height:100dvh;}
#loading-screen{position:fixed;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading-screen img{height:40px;width:auto;}
.spinner{width:28px;height:28px;border:3px solid #E3E3DE;border-top-color:#41828E;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888;}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:#F7F7F5;padding-bottom:88px;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#F7F7F5;min-height:100vh;min-height:100dvh;}

/* LOADING */
#loading-screen{
  position:fixed;inset:0;background:#fff;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#loading-screen img{height:40px;width:auto;}
.spinner{width:28px;height:28px;border:3px solid #E3E3DE;border-top-color:#41828E;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888;}

/* MAIN APP WRAPPER */
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  min-height:100dvh;
  background:#F7F7F5;
  padding-bottom:88px;
}

/* TOP BAR with logo */
.top-bar{
  background:#fff;
  border-bottom:1px solid #E3E3DE;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:20;
}
.top-bar img{height:30px;width:auto;}
.top-bar-right{font-size:11px;color:#888;}


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#fff;min-height:100vh;min-height:100dvh;overflow:hidden;}
#loading-screen{position:fixed;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading-screen img{height:40px;width:auto;}
.spinner{width:28px;height:28px;border:3px solid #E3E3DE;border-top-color:#41828E;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888;}
#home-screen{width:100%;max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:#fff;position:fixed;inset:0;left:50%;transform:translateX(-50%);}
@media(max-width:430px){#home-screen{left:0;transform:none;}}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0;}
.status-time{font-size:14px;font-weight:600;color:#3C485C;}
.status-icons{font-size:11px;color:#888;display:flex;gap:5px;}
.logo-area{padding:24px 24px 14px;border-bottom:1px solid #EBEBEB;}
.logo-area img{height:38px;width:auto;display:block;}
.logo-subtitle{font-size:11px;color:#888;margin-top:5px;}
.section-label-home{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#888;padding:18px 24px 10px;}
.app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 14px;padding:0 24px;}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
.app-icon:active .app-icon-img{transform:scale(.88);opacity:.85;}
.app-icon-img{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .12s,opacity .12s;box-shadow:0 2px 10px rgba(60,72,92,.13);position:relative;}
.app-icon-img::after{content:'';position:absolute;inset:0;border-radius:16px;border:0.5px solid rgba(0,0,0,.07);}
.icon-lav{background:linear-gradient(145deg,#52a08f,#41828E);}
.icon-soon{background:#F5F5F5;border:1.5px dashed #DDD;box-shadow:none;color:#CCC;font-size:20px;}
.icon-soon::after{display:none;}
.app-label{font-size:11px;color:#1A1A1A;font-weight:500;text-align:center;max-width:68px;line-height:1.3;}
.hspacer{flex:1;}
.hdivider{margin:0 24px;height:1px;background:#EBEBEB;}
.dock{margin:14px 24px 28px;background:#F7F7F7;border-radius:22px;padding:12px 20px;display:flex;justify-content:center;border:1px solid #EBEBEB;}
#lav-screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;background:#F7F7F5;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);max-width:430px;left:50%;margin-left:-215px;overflow:hidden;}
@media(max-width:430px){#lav-screen{left:0;margin-left:0;max-width:100%;}}
#lav-screen.open{transform:translateY(0);}
.lav-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F7F7F5;border-bottom:1px solid #E3E3DE;flex-shrink:0;}
.lav-topbar-left{display:flex;align-items:center;gap:8px;}
.lav-topbar-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(145deg,#52a08f,#41828E);display:flex;align-items:center;justify-content:center;font-size:14px;}
.lav-topbar-title{font-size:13px;font-weight:500;color:#3C485C;}
.lav-close{font-size:12px;font-weight:500;color:#41828E;background:rgba(65,130,142,.1);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:5px 10px;border-radius:8px;}
.lav-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --green:#0F6E56;--gl:#E1F5EE;--gm:#c8ede3;
  --blue:#185FA5;--bl:#E6F1FB;
  --red:#A32D2D;--rl:#FCEBEB;
  --yellow:#854F0B;--yl:#FAEEDA;
  --bg:#F7F7F5;--bg2:#EFEFEC;--surface:#fff;
  --border:#E3E3DE;--border2:#D0D0C8;
  --text:#1A1A17;--text2:#6B6B63;--text3:#9B9B90;
  --r:10px;--rl2:14px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;}
.app{max-width:430px;margin:0 auto;padding-bottom:88px;background:var(--bg);min-height:100vh;min-height:100dvh;}

/* HEADER */
.hdr{padding:16px 16px 0;background:var(--bg);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-size:15px;font-weight:600;letter-spacing:-.02em;}
.logo em{color:var(--green);font-style:normal;}
.back-btn{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:var(--font);}
.nav{display:flex;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none;}
.nav-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:500;font-family:var(--font);background:transparent;border:none;cursor:pointer;color:var(--text2);transition:all .15s;}
.nav-btn.active{background:var(--green);color:#fff;}

/* UNIT TABS */
.unit-tabs{display:flex;gap:6px;margin-bottom:12px;}
.unit-tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;font-family:var(--font);border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;color:var(--text2);text-align:center;transition:all .15s;position:relative;}
.unit-tab.active{border-color:var(--green);color:var(--green);background:var(--gl);}
.unit-tab.confirmed-tab{border-color:var(--green);}
.unit-tab .ck{font-size:9px;color:var(--green);margin-left:3px;}

/* SECTION */
.sec{padding:14px 16px;}
.sec-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:500;}

/* ITEM ROW — single counter */
.item-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:border-color .15s;}
.item-row.has-v{border-color:var(--gm);}
.item-row.has-diff{border-color:var(--red);background:var(--rl);}
.item-row.has-match{border-color:var(--green);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-price{font-size:11px;color:var(--text3);margin-top:1px;}
.counter{display:flex;align-items:center;gap:4px;}
.cbtn{width:30px;height:30px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;transition:all .1s;font-family:var(--font);}
.cbtn:active{background:var(--border);transform:scale(.94);}
.cbtn.plus{border-color:var(--green);color:var(--green);background:var(--gl);}
.cval{font-size:14px;font-weight:600;min-width:28px;text-align:center;color:var(--text);font-variant-numeric:tabular-nums;}
.cval.nz{color:var(--green);}

/* DUAL COLUMN ROW (conferência lado a lado) */
.dual-row{display:flex;align-items:stretch;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;overflow:hidden;}
.dual-row.diff{border-color:var(--red);}
.dual-row.match{border-color:var(--gm);}
.dual-info{padding:8px 10px;min-width:0;flex:1.4;}
.dual-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;}
.dual-price{font-size:10px;color:var(--text3);}
.dual-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;min-width:48px;border-left:1px solid var(--border);}
.dual-col-label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px;}
.dual-col-label.nl{color:var(--green);}
.dual-col-label.fl{color:var(--blue);}
.dual-col-val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.dual-col-val.nv{color:var(--green);}
.dual-col-val.fv{color:var(--blue);}
.dual-col-val.zero{color:var(--text3);font-weight:400;}
.dual-status{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 8px;border-left:1px solid var(--border);min-width:32px;}
.dot-ok{width:10px;height:10px;border-radius:50%;background:var(--green);}
.dot-diff{width:10px;height:10px;border-radius:50%;background:var(--red);}
.dot-empty{width:10px;height:10px;border-radius:50%;background:var(--border2);}

/* BADGES */
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0;font-family:var(--mono);}
.b-ok{background:var(--gl);color:var(--green);}
.b-warn{background:var(--rl);color:var(--red);}
.b-n{background:var(--gl);color:var(--green);}
.b-f{background:var(--bl);color:var(--blue);}

/* TOTALS */
.totals-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--rl2);padding:14px;border:1px solid var(--border);}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.titem label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.titem .val{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.02em;}
.titem .val.money{color:var(--green);}

/* ALERT BAR */
.alert{margin:0 16px 10px;padding:9px 12px;border-radius:var(--r);font-size:12px;font-weight:500;}
.a-ok{background:var(--gl);color:var(--green);}
.a-warn{background:var(--rl);color:var(--red);}
.a-pend{background:var(--yl);color:var(--yellow);}

/* FOOTER */
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 16px 20px;background:var(--bg);border-top:1px solid var(--border);}
.btn-p{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .15s;}
.btn-p:disabled{opacity:.35;cursor:default;}
.btn-p:active:not(:disabled){opacity:.85;}
.btn-s{width:100%;padding:12px;background:transparent;color:var(--green);border:1.5px solid var(--green);border-radius:var(--r);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;}
.wa-btn{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* EMPTY */
.empty{text-align:center;padding:56px 24px;color:var(--text2);font-size:14px;}
.empty .icon{font-size:40px;margin-bottom:14px;}
.empty strong{display:block;color:var(--text);font-weight:500;margin-bottom:4px;}

/* HIST CARD */
.hist-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:12px 14px;cursor:pointer;transition:all .15s;}
.hist-card:active{background:var(--bg2);transform:scale(.99);}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.hist-title{font-size:14px;font-weight:500;color:var(--text);letter-spacing:-.01em;}
.hist-sub{font-size:12px;color:var(--text2);}
.pill{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;font-family:var(--mono);}
.p-pend{background:var(--yl);color:var(--yellow);}
.p-ok{background:var(--gl);color:var(--green);}
.p-div{background:var(--rl);color:var(--red);}

/* CONFIRM BOX */
.confirm-box{margin:0 16px 12px;border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden;}
.confirm-side{padding:12px 14px;background:var(--surface);transition:background .2s;}
.confirm-side.done{background:var(--gl);}
.confirm-divider{height:1px;background:var(--border);}
.confirm-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;font-weight:500;}
.confirm-name{font-size:14px;font-weight:500;color:var(--text);}
.confirm-check{font-size:11px;color:var(--green);margin-top:2px;}
.confirm-btn{font-size:12px;font-weight:500;font-family:var(--font);background:none;border:1px solid;border-radius:8px;padding:5px 12px;cursor:pointer;margin-top:6px;}
.cb-n{color:var(--green);border-color:var(--green);}
.cb-f{color:var(--blue);border-color:var(--blue);}

/* LOCKED BAR */
.locked-bar{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--gl);border:1px solid var(--gm);border-radius:var(--r);margin-bottom:10px;font-size:12px;color:var(--green);font-weight:500;}
.edit-btn{margin-left:auto;font-size:11px;color:var(--green);background:rgba(15,110,86,.1);border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-family:var(--font);font-weight:500;}

/* MODAL */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--rl2) var(--rl2) 0 0;padding:20px 16px 32px;width:100%;max-width:430px;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:17px;font-weight:600;margin-bottom:8px;letter-spacing:-.02em;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.55;}
.mactions{display:flex;gap:8px;}
.mactions button{flex:1;padding:11px;border-radius:var(--r);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);}
.mactions .btn-confirm{background:var(--green);color:#fff;border-color:var(--green);}
.mactions .btn-warn{background:var(--red);color:#fff;border-color:var(--red);}
.input-field{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);margin-top:6px;outline:none;transition:border-color .15s;}
.input-field:focus{border-color:var(--green);}
select.input-field{appearance:none;cursor:pointer;}
.form-label{font-size:12px;color:var(--text2);display:block;margin-top:14px;font-weight:500;}
.form-label:first-child{margin-top:0;}

/* MISC */
.spacer{height:12px;}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;}
.meta-text{font-size:11px;color:var(--text3);}
.quinz-header{margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.quinz-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.02em;}
.quinz-val{font-size:14px;font-weight:600;color:var(--green);letter-spacing:-.02em;}
.col-headers{display:flex;gap:0;margin-bottom:6px;padding:0 2px;}
.col-h{flex:1;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;text-align:center;color:var(--text3);}
.col-h.nh{color:var(--green);}
.col-h.fh{color:var(--blue);}

/* HUB CARDS */
.hub-card{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;cursor:pointer;transition:all .15s;}
.hub-card:active{background:var(--bg2);transform:scale(.98);}
.hub-card.disabled{opacity:.45;cursor:default;}
.hub-card.forn-card{border-color:var(--blue);background:var(--bl);}
.hub-card-left{display:flex;align-items:center;gap:12px;}
.hub-card-icon{width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hub-card-title{font-size:14px;font-weight:500;color:var(--text);}
.hub-card-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.b-pend{background:var(--yl);color:var(--yellow);}



</style>
</head>

<div class="app" id="app"></div>
<script>
function updateClock(){
  const el=document.getElementById('clock');
  if(!el) return;
  const n=new Date();
  el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
updateClock();setInterval(updateClock,15000);
function closeLav(){} // no-op, kept for compatibility

const PECAS=[
  {id:'lc_king',nome:'Lençol cobrir — king',valor:12},
  {id:'le_king',nome:'Lençol elástico — king',valor:12},
  {id:'lc_queen',nome:'Lençol cobrir — queen',valor:8},
  {id:'le_queen',nome:'Lençol elástico — queen',valor:8},
  {id:'lc_casal',nome:'Lençol cobrir — casal',valor:5},
  {id:'le_casal',nome:'Lençol elástico — casal',valor:5},
  {id:'lc_solteiro',nome:'Lençol cobrir — solteiro',valor:5},
  {id:'le_solteiro',nome:'Lençol elástico — solteiro',valor:5},
  {id:'ce_king',nome:'Capa edredom — king',valor:18},
  {id:'ce_queen',nome:'Capa edredom — queen',valor:15},
  {id:'ce_casal',nome:'Capa edredom — casal',valor:12},
  {id:'fronha',nome:'Fronha',valor:3},
  {id:'tb',nome:'Toalha de banho',valor:6.5},
  {id:'tr',nome:'Toalha de rosto',valor:5.5},
  {id:'tap',nome:'Tapete de banheiro',valor:5.5},
];
const UNIDADES=['Pinheiros','Vila Mariana'];
const GRUPOS=[
  {nome:'Lençóis',ids:PECAS.filter(p=>p.id.startsWith('l'))},
  {nome:'Capas de edredom',ids:PECAS.filter(p=>p.id.startsWith('ce'))},
  {nome:'Fronhas/Banho',ids:PECAS.filter(p=>['fronha','tb','tr','tap'].includes(p.id))},
];

function emptyC(){
  const c={};
  UNIDADES.forEach(u=>{c[u]={};PECAS.forEach(p=>{c[u][p.id]=0;});});
  return c;
}

function loadState(){
  return{view:'hub',activeUnit:'Pinheiros',coletas:[],currentColeta:null,modal:null};
}

function saveState(){
  if(!window.DB) return;
  const updates={};
  (S.coletas||[]).forEach(col=>{updates['coletas/'+col.id]=col;});
  window.DB.ref('/').update(updates).catch(e=>console.error('Save error',e));
}

let S=loadState();

function hideLoading(){
  const ls=document.getElementById('loading-screen');
  if(ls) ls.style.display='none';
}

function initFirebase(){
  // Load from localStorage and show app immediately
  try {
    const raw=localStorage.getItem('nomade_lav_v6');
    if(raw){
      const saved=JSON.parse(raw);
      S.coletas=saved.coletas||[];
      S.coletas.sort((a,b)=>b.id-a.id);
      if(!S.currentColeta){
        const active=S.coletas.find(c=>!c.finalizada);
        if(active) S.currentColeta=active.id;
      }
    }
  } catch(e){ console.error('Load error:',e); }
  hideLoading();
  render();
}

// ---- HELPERS ----
function totalValC(c){let t=0;UNIDADES.forEach(u=>PECAS.forEach(p=>t+=(c[u][p.id]||0)*p.valor));return t;}
function totalPU(c,u){return PECAS.reduce((s,p)=>s+(c[u][p.id]||0),0);}
function totalPC(c){let t=0;UNIDADES.forEach(u=>PECAS.forEach(p=>t+=(c[u][p.id]||0)));return t;}
function divs(col){
  const d=[];
  UNIDADES.forEach(u=>PECAS.forEach(p=>{
    const n=col.nomade[u][p.id]||0,f=col.fornecedor[u][p.id]||0;
    if(n!==f)d.push({u,p,n,f});
  }));
  return d;
}
function valValidado(col){
  let t=0;
  UNIDADES.forEach(u=>PECAS.forEach(p=>{
    t+=Math.min(col.nomade[u][p.id]||0,col.fornecedor[u][p.id]||0)*p.valor;
  }));
  return t;
}
function allNOk(col){return col.nomadeOk&&col.nomadeOk['Pinheiros']&&col.nomadeOk['Vila Mariana'];}
function allFOk(col){return col.fornecedorOk&&col.fornecedorOk['Pinheiros']&&col.fornecedorOk['Vila Mariana'];}
function colStatus(col){
  if(!allFOk(col))return'pendente';
  if(divs(col).length>0)return'divergente';
  return'confirmado';
}
function ql(q){return q==='1'?'1ª quinzena':'2ª quinzena';}
function setView(v){S.view=v;saveState();render();}
function setUnit(u){S.activeUnit=u;render();}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtM(v){return'R$ '+v.toFixed(2).replace('.',',');}
function getCol(){return S.coletas.find(c=>c.id===S.currentColeta);}

// ---- ACTIONS ----
function startNova(){S.modal='nova';S._nf={data:today(),periodo:'retirada',turno:'1'};render();}

function confirmNova(){
  const f=S._nf;if(!f.data)return;
  const col={
    id:Date.now(),data:f.data,periodo:f.periodo,turno:f.turno,
    nomade:emptyC(),fornecedor:emptyC(),
    nomadeOk:{Pinheiros:false,'Vila Mariana':false},
    fornecedorOk:{Pinheiros:false,'Vila Mariana':false},nomadeNome:'',fornecedorNome:'',confirmedAt:null,
  };
  S.coletas.unshift(col);
  S.currentColeta=col.id;
  S.modal=null;S.view='nomade';
  saveState();render();
}

function openColeta(id){
  S.currentColeta=id;
  const col=S.coletas.find(c=>c.id===id);if(!col)return;
  if(!allNOk(col))S.view='hub';
  else if(!allFOk(col))S.view='fornecedor';
  else S.view='conferencia';
  render();
}

function changeCount(who,unit,id,delta){
  const col=getCol();if(!col)return;
  col[who][unit][id]=Math.max(0,(col[who][unit][id]||0)+delta);
  saveState();render();
}

// Unlock unit for editing
function unlockUnit(u){
  const col=getCol();if(!col)return;
  col.nomadeOk[u]=false;
  // If fornecedor already confirmed, also reset fornecedor so flow restarts cleanly
  if(allFOk(col)){col.fornecedorOk={Pinheiros:false,'Vila Mariana':false};col.nomadeNome='';col.fornecedorNome='';}
  S.view='nomade';S.activeUnit=u;
  saveState();render();
}

function unlockFornUnit(u){
  const col=getCol();if(!col)return;
  col.fornecedorOk[u]=false;col.fornecedorNome='';
  S.activeUnit=u;S.view='fornecedor';saveState();render();
}
function unlockFornecedor(){
  const col=getCol();if(!col)return;
  col.fornecedorOk={Pinheiros:false,'Vila Mariana':false};col.fornecedorNome='';
  S.view='fornecedor';saveState();render();
}

function submitUnidade(u){S.modal='confirm_unidade';S._cu=u;render();}
function confirmarUnidade(){
  const col=getCol();if(!col)return;
  col.nomadeOk[S._cu]=true;
  S.modal=null;
  S.view='hub'; // go back to hub after confirming a unit
  saveState();render();
}
function submitForn(){S._cu=S.activeUnit;S.modal='confirm_forn';render();}
function confirmarForn(){
  const col=getCol();if(!col)return;
  col.fornecedorOk[S._cu]=true;
  S.modal=null;
  if(allFOk(col)){col.confirmedAt=new Date().toISOString();S.view='conferencia';}
  else S.view='fornecedor';
  saveState();render();
}
function assinarN(){S.modal='assinar_n';S._ai='';render();}
function confirmarAssinarN(){
  const col=getCol();if(!col)return;
  col.nomadeNome=S._ai||'Nômade';S.modal=null;saveState();render();
}
function assinarF(){S.modal='assinar_f';S._ai='';render();}
function confirmarAssinarF(){
  const col=getCol();if(!col)return;
  col.fornecedorNome=S._ai||'Fornecedor';S.modal=null;saveState();render();
}

function confirmarRetirada(){
  const col=getCol();
  if(col) col.finalizada=true;
  S.currentColeta=null;
  S.view='home';
  saveState();
  render();
  // retirada confirmed, already on hub
}

function goHub(){
  // After confirming unit, go back to hub (active coleta exists)
  S.view='hub';
  render();
}

function goHome(){
  // Nav tab click: if active coleta, show hub; else show home with button
  const col=getActiveCurrent();
  S.view=(col&&!col.finalizada)?'hub':'home';
  render();
}
function exportWA(){
  const col=getCol();if(!col)return;
  const dd=divs(col);const val=valValidado(col);
  let msg=`*Nômade Lavanderia — Conferência*\nData: ${fmtDate(col.data)} | ${col.periodo==='retirada'?'Retirada':'Entrega'} | ${ql(col.turno)}\n\n`;
  if(!dd.length)msg+=`✅ Sem divergências\n`;
  else{msg+=`⚠️ ${dd.length} divergência${dd.length>1?'s':''}:\n`;dd.forEach(d=>{msg+=`• ${d.p.nome} (${d.u}): Nômade ${d.n} / Forn. ${d.f}\n`;});}
  msg+=`\n*Total Nômade:* ${fmtM(totalValC(col.nomade))}\n*Total validado:* ${fmtM(val)}\n`;
  if(col.nomadeNome)msg+=`\n✅ Nômade: ${col.nomadeNome}`;
  if(col.fornecedorNome)msg+=`\n✅ Fornecedor: ${col.fornecedorNome}`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function pedirExcluir(id){
  S._excluirId=id;
  S.modal='confirmar_excluir';
  render();
}
function confirmarExcluir(){
  S.coletas=S.coletas.filter(c=>c.id!==S._excluirId);
  if(S.currentColeta===S._excluirId) S.currentColeta=null;
  S.modal=null;
  S.view='home';
  saveState();render();
}
function qColetas(q){return S.coletas.filter(c=>c.turno===q);}
function totalQ(q){return qColetas(q).filter(c=>allFOk(c)).reduce((s,c)=>s+valValidado(c),0);}

// ---- RENDER ----
function render(){
  const app=document.getElementById('app');
  let html=renderHdr()+`<div id="main">`;
  if(S.view==='hub')html+=renderHub();
  else if(S.view==='home')html+=renderHome();
  else if(S.view==='nomade_pin')html+=renderNomadeUnit('Pinheiros');
  else if(S.view==='nomade_vm')html+=renderNomadeUnit('Vila Mariana');
  else if(S.view==='fornecedor')html+=renderFornecedor();
  else if(S.view==='conferencia')html+=renderConferencia();
  else if(S.view==='historico')html+=renderHistorico();
  else if(S.view==='quinzena')html+=renderQuinzena();
  html+=`</div>`+renderFooter();
  if(S.modal)html+=renderModal();
  app.innerHTML=html;
}

function renderFooter(){
  if(S.view==='historico'||S.view==='quinzena') return'';
  if(S.view==='hub') return''; // hub shows cards, no footer needed
  if(S.view==='home'){
    return`<div class="footer"><button class="btn-p" onclick="startNova()">+ Nova coleta</button></div>`;
  }

  if(S.view==='nomade_pin'||S.view==='nomade_vm'){
    const col=getCol();if(!col)return'';
    const u=S.view==='nomade_pin'?'Pinheiros':'Vila Mariana';
    const jaOk=col.nomadeOk[u];
    if(jaOk)return`<div class="footer"><button class="btn-p" disabled>✓ ${u} confirmado</button></div>`;
    return`<div class="footer"><button class="btn-p" onclick="submitUnidade('${u}')">Confirmar envio — ${u}</button></div>`;
  }
  if(S.view==='fornecedor'){
    const col=getCol();
    const ok=col&&!allFOk(col)&&totalPC(col.fornecedor)>0;
    // per-unit confirm
    const u=S.activeUnit,jaOk=col&&col.fornecedorOk[u],outra=UNIDADES.find(x=>x!==u);
    if(col&&allFOk(col))return`<div class="footer"><button class="btn-p" disabled>✓ Conferência confirmada</button></div>`;
    if(jaOk&&!col.fornecedorOk[outra])
      return`<div class="footer"><button class="btn-p" onclick="setUnit('${outra}')">Ir para ${outra} →</button></div>`;
    if(jaOk)return`<div class="footer"><button class="btn-p" disabled>✓ Ambas confirmadas</button></div>`;
    return`<div class="footer"><button class="btn-p" onclick="submitForn()">Confirmar conferência — ${u}</button></div>`;
  }
  if(S.view==='conferencia'){
    const col=getCol();
    const ambosAssinaram=col&&col.nomadeNome&&col.fornecedorNome;

function renderHistCard(col){
  const st=colStatus(col);
  const lbl={pendente:'Pendente',confirmado:'Confirmado',divergente:'Divergência'}[st];
  const cls={pendente:'p-pend',confirmado:'p-ok',divergente:'p-div'}[st];
  const dd=divs(col);
  const val=col.fornecedorOk?valValidado(col):totalValC(col.nomade);
  return`<div class="hist-card" onclick="openColeta(${col.id})">
    <div class="hist-top">
      <div class="hist-title">${fmtDate(col.data)} · ${col.periodo==='retirada'?'Retirada':'Entrega'}</div>
      <span class="pill ${cls}">${lbl}</span>
    </div>
    <div class="hist-sub">${ql(col.turno)} · ${fmtM(val)}${dd.length>0&&col.fornecedorOk?` · ${dd.length} div.`:''}</div>

}

function getActiveCurrent(){
  // Find most recent non-finalized coleta
  if(S.currentColeta){
    const col=S.coletas.find(c=>c.id===S.currentColeta);
    if(col&&!col.finalizada) return col;
  }
  // Find most recent non-finalized
  const active=S.coletas.find(c=>!c.finalizada);
  if(active){S.currentColeta=active.id;return active;}
  return null;
}

function renderQuinzena(){
  let html=`<div class="spacer"></div>`;

  ['1','2'].forEach(q=>{
    const cols=qColetas(q);
    const total=totalQ(q);
    const conf=cols.filter(c=>allFOk(c)).length;
    const pend=cols.filter(c=>!allFOk(c)).length;

    // Aggregate totals per peca across confirmed coletas
    const pecaTotN={}, pecaTotF={};
    PECAS.forEach(p=>{pecaTotN[p.id]=0;pecaTotF[p.id]=0;});
    cols.filter(c=>allFOk(c)).forEach(col=>{
      UNIDADES.forEach(u=>{
        PECAS.forEach(p=>{
          pecaTotN[p.id]+=(col.nomade[u][p.id]||0);
          pecaTotF[p.id]+=(col.fornecedor[u][p.id]||0);
        });
      });
    });

    const totalPecasN=PECAS.reduce((s,p)=>s+pecaTotN[p.id],0);
    const totalPecasF=PECAS.reduce((s,p)=>s+pecaTotF[p.id],0);
    const totalValN=PECAS.reduce((s,p)=>s+pecaTotN[p.id]*p.valor,0);

    html+=`<div class="quinz-header"><span class="quinz-title">Resumo ${ql(q)}</span><span class="quinz-val">${fmtM(total)}</span></div>`;

    html+=`<div class="totals-card" style="margin-top:-4px;">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">${cols.length} coleta${cols.length!==1?'s':''} · ${conf} confirmada${conf!==1?'s':''} · ${pend} pendente${pend!==1?'s':''}</div>`;

    if(conf>0){
      // Header row
      html+=`<div style="display:flex;gap:0;margin-bottom:6px;padding:0 2px;">
        <div style="flex:1.6;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);">Peça</div>
        <div style="flex:.5;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--green);text-align:center;">Qtd</div>
        <div style="flex:.8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--green);text-align:right;">Valor</div>
      </div>`;

      // Rows per group
      GRUPOS.forEach(g=>{
        const comPecas=g.ids.filter(p=>pecaTotF[p.id]>0||pecaTotN[p.id]>0);
        if(!comPecas.length) return;
        html+=`<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:6px 0 3px;">${g.nome}</div>`;
        comPecas.forEach(p=>{
          const qtd=pecaTotF[p.id]; // validated qty (fornecedor confirmed)
          const val=qtd*p.valor;
          html+=`<div style="display:flex;gap:0;padding:5px 2px;border-bottom:0.5px solid var(--border);align-items:center;">
            <div style="flex:1.6;font-size:12px;color:var(--text);">${p.nome}</div>
            <div style="flex:.5;font-size:12px;font-weight:600;color:var(--text);text-align:center;">${qtd}</div>
            <div style="flex:.8;font-size:12px;font-weight:500;color:var(--green);text-align:right;">${fmtM(val)}</div>
          </div>`;
        });
      });

      // Total row
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1.5px solid var(--border);">
        <span style="font-size:12px;font-weight:600;color:var(--text);">Total validado</span>
        <span style="font-size:16px;font-weight:600;color:var(--green);">${fmtM(total)}</span>
      </div>`;
    } else {
      html+=`<div style="font-size:12px;color:var(--text3);padding:4px 0;">Nenhuma coleta confirmada ainda.</div>`;
    }

    html+=`</div><div style="height:16px;"></div>`;
  });

  // Grand total
  const tg=totalQ('1')+totalQ('2');
  html+=`<div style="margin:0 16px;"><div class="totals-card" style="background:var(--gl);border-color:var(--gm);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;font-weight:600;color:var(--green);">Total geral (período)</span>
      <span style="font-size:22px;font-weight:600;color:var(--green);letter-spacing:-.03em;">${fmtM(tg)}</span>
    </div>
  </div></div>`;

  return html;
}
function renderModal(){
  if(S.modal==='nova'){
    const f=S._nf||{};
    return`<div class="modal-wrap"><div class="modal">
      <h3>Nova coleta</h3>
      <span class="form-label">Data</span>
      <input class="input-field" type="date" value="${f.data||today()}" onchange="S._nf.data=this.value">
      <span class="form-label">Tipo</span>
      <select class="input-field" onchange="S._nf.periodo=this.value">
        <option value="retirada" ${f.periodo==='retirada'?'selected':''}>Retirada (envio de sujas)</option>
        <option value="entrega" ${f.periodo==='entrega'?'selected':''}>Entrega (recebimento de limpas)</option>
      </select>
      <span class="form-label">Quinzena</span>
      <select class="input-field" onchange="S._nf.turno=this.value">
        <option value="1" ${f.turno==='1'?'selected':''}>1ª quinzena</option>
        <option value="2" ${f.turno==='2'?'selected':''}>2ª quinzena</option>
      </select>
      <div class="mactions" style="margin-top:18px;">
        <button onclick="S.modal=null;render()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmNova()">Iniciar</button>
      </div>
    </div></div>`;
  }
  if(S.modal==='confirm_unidade'){
    const col=getCol(),u=S._cu;
    const pecas=totalPU(col.nomade,u),valor=PECAS.reduce((s,p)=>s+(col.nomade[u][p.id]||0)*p.valor,0);
    return`<div class="modal-wrap"><div class="modal">
      <h3>Confirmar envio — ${u}</h3>
      <p>${pecas} peças · ${fmtM(valor)}<br>Após confirmar, use o botão "Editar" se precisar corrigir.</p>
      <div class="mactions">
        <button onclick="S.modal=null;render()">Voltar</button>
        <button class="btn-confirm" onclick="confirmarUnidade()">Confirmar</button>
      </div>
    </div></div>`;
  }
  if(S.modal==='confirm_forn'){
    const col=getCol();
    return`<div class="modal-wrap"><div class="modal">
      <h3>Confirmar conferência — ${S._cu}</h3>
      <p>${totalPU(col.fornecedor,S._cu)} peças conferidas em ${S._cu}.<br>Você pode editar depois se necessário.</p>
      <div class="mactions">
        <button onclick="S.modal=null;render()">Voltar</button>
        <button class="btn-confirm" onclick="confirmarForn()">Confirmar</button>
      </div>
    </div></div>`;
  }
  if(S.modal==='assinar_n')
    return`<div class="modal-wrap"><div class="modal">
      <h3>Confirmação — Nômade</h3><p>Informe o nome de quem está confirmando pela Nômade.</p>
      <input class="input-field" type="text" placeholder="Nome completo" oninput="S._ai=this.value" autofocus>
      <div class="mactions" style="margin-top:14px;">
        <button onclick="S.modal=null;render()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarAssinarN()">Confirmar</button>
      </div>
    </div></div>`;
  if(S.modal==='assinar_f')
    return`<div class="modal-wrap"><div class="modal">
      <h3>Confirmação — Fornecedor</h3><p>Informe o nome de quem está confirmando pelo fornecedor.</p>
      <input class="input-field" type="text" placeholder="Nome completo" oninput="S._ai=this.value" autofocus>
      <div class="mactions" style="margin-top:14px;">
        <button onclick="S.modal=null;render()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarAssinarF()">Confirmar</button>
      </div>
    </div></div>`;
  return'';
}

render();

// Start app
window.addEventListener('DOMContentLoaded', function(){
  initFirebase();
});
</script>
